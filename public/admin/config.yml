# ============================================================
#  Decap CMS Configuration
#  Edit content at: https://<your-domain>/admin/
#
#  One-time setup:
#  1. Create a GitHub OAuth App at:
#     https://github.com/settings/developers
#     - Homepage URL:  https://<username>.github.io/<repo>
#     - Callback URL:  https://<username>.github.io/<repo>/admin/
#  2. Paste your OAuth App Client ID below (replace GITHUB_CLIENT_ID)
#  3. Enable GitHub Pages (source: GitHub Actions) in repo settings
# ============================================================

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # ← change this
  branch: main
  auth_type: implicit
  app_id: YOUR_GITHUB_OAUTH_CLIENT_ID         # ← change this

media_folder: "public/images"
public_folder: "/images"

# ============================================================
#  ENGLISH CONTENT
# ============================================================
collections:
  - name: "en_home"
    label: "English — Home Page"
    files:
      - name: "home"
        label: "Home"
        file: "src/data/en/home.yaml"
        fields:
          - { label: "Partner 1 Name", name: "partner1", widget: "string" }
          - { label: "Partner 2 Name", name: "partner2", widget: "string" }
          - { label: "Wedding Date", name: "date", widget: "string", hint: "e.g. 14. June 2026" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - label: "Hero Image"
            name: "hero_image"
            widget: "image"
            required: false

  - name: "en_schedule"
    label: "English — Schedule"
    files:
      - name: "schedule"
        label: "Schedule"
        file: "src/data/en/schedule.yaml"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "Events"
            name: "events"
            widget: "list"
            fields:
              - { label: "Time", name: "time", widget: "string", hint: "e.g. 14:00" }
              - { label: "Event Name", name: "label", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "en_venue"
    label: "English — Venue & Travel"
    files:
      - name: "venue"
        label: "Venue"
        file: "src/data/en/venue.yaml"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Venue Name", name: "venue_name", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Google Maps URL", name: "maps_url", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Travel & Accommodation Notes", name: "travel_notes", widget: "text" }

  - name: "en_rsvp"
    label: "English — RSVP"
    files:
      - name: "rsvp"
        label: "RSVP"
        file: "src/data/en/rsvp.yaml"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Google Form Embed URL", name: "google_form_url", widget: "string", hint: "Use the embed URL ending with ?embedded=true" }
          - { label: "Deadline Notice", name: "deadline", widget: "string" }

# ============================================================
#  GERMAN CONTENT
# ============================================================
  - name: "de_home"
    label: "Deutsch — Startseite"
    files:
      - name: "home"
        label: "Startseite"
        file: "src/data/de/home.yaml"
        fields:
          - { label: "Name Partner 1", name: "partner1", widget: "string" }
          - { label: "Name Partner 2", name: "partner2", widget: "string" }
          - { label: "Hochzeitsdatum", name: "date", widget: "string", hint: "z.B. 14. Juni 2026" }
          - { label: "Einleitungstext", name: "intro", widget: "text" }
          - label: "Headerbild"
            name: "hero_image"
            widget: "image"
            required: false

  - name: "de_schedule"
    label: "Deutsch — Ablauf"
    files:
      - name: "schedule"
        label: "Ablauf"
        file: "src/data/de/schedule.yaml"
        fields:
          - { label: "Seitenüberschrift", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string" }
          - label: "Programmpunkte"
            name: "events"
            widget: "list"
            fields:
              - { label: "Uhrzeit", name: "time", widget: "string", hint: "z.B. 14:00" }
              - { label: "Bezeichnung", name: "label", widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }

  - name: "de_venue"
    label: "Deutsch — Ort & Anreise"
    files:
      - name: "venue"
        label: "Ort"
        file: "src/data/de/venue.yaml"
        fields:
          - { label: "Seitenüberschrift", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string" }
          - { label: "Name des Veranstaltungsortes", name: "venue_name", widget: "string" }
          - { label: "Adresse", name: "address", widget: "string" }
          - { label: "Google Maps URL", name: "maps_url", widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "text" }
          - { label: "Anreise & Unterkunft", name: "travel_notes", widget: "text" }

  - name: "de_rsvp"
    label: "Deutsch — RSVP"
    files:
      - name: "rsvp"
        label: "RSVP"
        file: "src/data/de/rsvp.yaml"
        fields:
          - { label: "Seitenüberschrift", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string" }
          - { label: "Einleitungstext", name: "intro", widget: "text" }
          - { label: "Google Formular Einbettungs-URL", name: "google_form_url", widget: "string", hint: "Einbettungs-URL mit ?embedded=true am Ende" }
          - { label: "Antwortfrist", name: "deadline", widget: "string" }
